name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - 'specification.sigil/**'
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-site:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Export spec JSON
        run: npx tsx scripts/export-sigil-json.ts

      - name: Build site
        working-directory: site
        run: |
          npm run build
          cp src/data/sigil-spec.json dist/sigil-spec.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - id: deployment
        uses: actions/deploy-pages@v4
