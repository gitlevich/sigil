<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 264 264" width="264" height="264">
  <style>
    :root {
      --bg: #fff;
      --fg: #000;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #fff;
      }
    }
    .ghost { opacity: 0.015; }
    @media (prefers-color-scheme: dark) {
      .ghost { opacity: 0.08; }
    }
  </style>

  <!-- Outer extension rectangle -->
