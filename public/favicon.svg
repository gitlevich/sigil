<svg xmlns="http://www.w3.org/2000/svg" viewBox="-12 -12 264 264" width="264" height="264">
  <style>
    :root {
      --bg: #fff;
      --fg: #000;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000;
        --fg: #fff;
      }
    }
  </style>

  <!-- Outer extension rectangle -->
  <rect x="-10" y="-10" width="260" height="260" rx="8" ry="8" fill="var(--bg)"/>
  <!-- Inner bordered rectangle -->
  <rect x="1" y="1" width="238" height="238" rx="6" ry="6" fill="var(--bg)" stroke="var(--fg)" stroke-width="2"/>
  <!-- Circle -->
  <circle cx="120" cy="120" r="114" fill="var(--bg)" stroke="var(--fg)" stroke-width="2"/>

  <!-- Sierpinski triangle (3rd iteration) pointing left -->
  <polygon points="10,120 175,24.74 175,215.26" fill="var(--fg)"/>

  <!-- Level 3 hole -->
  <polygon points="92.5,72.37 92.5,167.63 175,120" fill="var(--bg)"/>
  <!-- Level 2 holes -->
  <polygon points="51.25,96.185 51.25,143.815 92.5,120" fill="var(--bg)"/>
  <polygon points="133.75,48.555 175,72.37 133.75,96.185" fill="var(--bg)"/>
  <polygon points="133.75,191.445 175,167.63 133.75,143.815" fill="var(--bg)"/>
  <!-- Level 1 holes -->
  <polygon points="30.625,108.0925 30.625,131.9075 51.25,120" fill="var(--bg)"/>
  <polygon points="71.875,84.2775 92.5,96.185 71.875,108.0925" fill="var(--bg)"/>
  <polygon points="71.875,155.7225 92.5,143.815 71.875,131.9075" fill="var(--bg)"/>
  <polygon points="154.375,36.6475 175,48.555 154.375,60.4625" fill="var(--bg)"/>
  <polygon points="113.125,60.4625 113.125,84.2775 133.75,72.37" fill="var(--bg)"/>
  <polygon points="175,96.185 154.375,108.0925 154.375,84.2775" fill="var(--bg)"/>
  <polygon points="154.375,203.3525 175,191.445 154.375,179.5375" fill="var(--bg)"/>
  <polygon points="113.125,179.5375 113.125,155.7225 133.75,167.63" fill="var(--bg)"/>
  <polygon points="175,143.815 154.375,131.9075 154.375,155.7225" fill="var(--bg)"/>
</svg>
